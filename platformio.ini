; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Target: Elecrow CrowPanel Advance 2.4" HMI ESP32 AI Display
; Module: ESP32-S3-WROOM-1-N16R8 (16MB flash, 8MB octal PSRAM)
; Display: 2.4" 320x240 IPS, ST7789 driver
; Touch:   I2C capacitive, addr 0x38, SDA=IO15, SCL=IO16
; Backlight: IO38
[env:crowpanel-advance-24]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

monitor_speed = 115200
upload_speed = 921600

; USB1 = ESP32-S3 native USB (shows as /dev/cu.usbmodem*). Used because USB0
; (CH340) isn't enumerating on this unit. Globs tolerate reconnect renaming.
upload_port = /dev/cu.usbmodem*
monitor_port = /dev/cu.usbmodem*

lib_deps =
    lovyan03/LovyanGFX@^1.1.16
    adafruit/Adafruit BNO08x@^1.2.3
    adafruit/Adafruit BusIO@^1.15.0
    bitbank2/JPEGDEC@^1.6.0
    ; GY-85 fallback IMU path (auto-selected at runtime when no BNO085
    ; ACKs at boot). ADXL345 + HMC5883L + direct ITG3205 register I/O;
    ; yaw is integrated from gyro and pitch is taken from accel tilt
    ; (see ImuInput.cpp), so no AHRS fusion library is needed.
    adafruit/Adafruit ADXL345@^1.3.4
    adafruit/Adafruit HMC5883 Unified@^1.2.3

build_flags =
    -DCORE_DEBUG_LEVEL=5
    -DARDUINO_ARCH_ESP32
    -DBOARD_HAS_PSRAM
    ; Route Serial over the ESP32-S3 native USB (USB1, /dev/cu.usbmodem*).
    ; CDC_ON_BOOT=1 also lets esptool auto-reset into bootloader via DTR/RTS,
    ; avoiding manual BOOT+RESET before every upload.
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
